<!DOCTYPE html>

<html>

<head>

<title>RelayPOP Login</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body style="display:flex;align-items:center;justify-content:center;height:100vh;background:#f4f6f8;">

<div class="box" style="width:320px;text-align:center;">

  <div style="display:flex;justify-content:space-between;align-items:flex-start;">

    <div>

        <h2 style="margin:0;">RelayPOP</h2>

        <p style="color:#888;margin:6px 0 0 0;">
            Simple POP3 Connector
        </p>

    </div>

    <img
        src="/static/img/mail.png"
        alt="RelayPOP"
        style="width:72px;height:auto;"

    >

   </div>
    {% if error %}

        <p style="color:#c0392b;margin-top:20px;">
            {{ error }}
        </p>

    {% endif %}

    <form method="POST" style="margin-top:25px;">

        <p>

            <input
                name="password"
                type="password"
                placeholder="Password"
                autofocus
                style="width:100%;box-sizing:border-box;"
            >

        </p>

        <p style="margin-top:20px;">

            <button
                type="submit"
                class="button"
                style="width:100%;border:none;cursor:pointer;">

                Sign in

            </button>

        </p>

    </form>

</div>

</body>

</html>
